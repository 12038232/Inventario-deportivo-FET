<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — Tienda Deportiva</title>

  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde:    #1a8c4e;
      --verde-dk: #0f5c33;
      --verde-lt: #d4f0e2;
      --negro:    #0d0d0d;
      --gris:     #f4f4f2;
      --gris-md:  #b0b0a8;
      --blanco:   #ffffff;
      --rojo:     #d63031;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--negro);
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* Panel izquierdo */
    .panel-izq {
      background: var(--verde-dk);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }

    .panel-izq h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      color: var(--blanco);
      text-transform: uppercase;
    }

    .panel-izq h1 span {
      color: #6ee4a6;
    }

    .panel-izq p {
      margin-top: 1rem;
      color: rgba(255,255,255,0.6);
    }

    /* Panel derecho */
    .panel-der {
      background: var(--blanco);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .form-box {
      width: 100%;
      max-width: 380px;
    }

    .form-box h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2rem;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .sub {
      color: var(--gris-md);
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .campo {
      margin-bottom: 1.2rem;
    }

    .campo label {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #555;
      display: block;
      margin-bottom: 5px;
    }

    .campo input {
      width: 100%;
      padding: 0.8rem;
      border-radius: 10px;
      border: 1.5px solid #e0e0d8;
      background: var(--gris);
      outline: none;
    }

    .campo input:focus {
      border-color: var(--verde);
      background: var(--blanco);
    }

    .btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--verde);
      color: var(--blanco);
      border: none;
      border-radius: 10px;
      font-family: 'Barlow Condensed';
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn:hover {
      background: var(--verde-dk);
    }

    .msg {
      margin-top: 10px;
      font-size: 0.85rem;
    }

    .msg.error { color: var(--rojo); }
    .msg.ok { color: var(--verde); }

    .link {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      text-align: center;
    }

    .link a {
      color: var(--verde);
      text-decoration: none;
      font-weight: 500;
    }

    .link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      body { grid-template-columns: 1fr; }
      .panel-izq { display: none; }
    }
  </style>
</head>

<body>

  <!-- Panel izquierdo -->
  <div class="panel-izq">
    <h1>Registro<br><span>Usuarios</span></h1>
    <p>Crea tu cuenta para acceder al sistema de inventario deportivo.</p>
  </div>

  <!-- Panel derecho -->
  <div class="panel-der">
    <div class="form-box">

      <h2>Crear cuenta</h2>
      <p class="sub">Completa los datos para registrarte</p>

      <div class="campo">
        <label>Nombre</label>
        <input type="text" id="nombre">
      </div>

      <div class="campo">
        <label>Correo</label>
        <input type="email" id="email">
      </div>

      <div class="campo">
        <label>Contraseña</label>
        <input type="password" id="password">
      </div>

      <button class="btn" onclick="registrar()">Registrarse</button>

      <p id="msg" class="msg"></p>

      <div class="link">
        ¿Ya tienes cuenta?
        <a href="index.html">Iniciar sesión</a>
      </div>

    </div>
  </div>

  <script>
    const API = 'http://localhost:5000';

    async function registrar() {
      const nombre = document.getElementById('nombre').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('msg');

      try {
        const res = await fetch(`${API}/api/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nombre, email, password })
        });

        const data = await res.json();

        if (res.ok) {
          msg.textContent = "Registro exitoso ✔";
          msg.className = "msg ok";

          setTimeout(() => {
            window.location.href = "index.html";
          }, 1500);

        } else {
          msg.textContent = data.error;
          msg.className = "msg error";
        }

      } catch (e) {
        msg.textContent = "Error de conexión con el servidor";
        msg.className = "msg error";
      }
    }
  </script>

</body>
</html>
